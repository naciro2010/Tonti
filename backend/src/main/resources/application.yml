spring:
  application:
    name: tonti-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 20

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

# Server config
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.tonti: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

---
# Development profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/tonti_db
    username: tonti
    password: tonti_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    show-sql: true

# App config - Development
app:
  jwt:
    secret: dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    expiration: 86400000      # 24 heures
    refresh-expiration: 604800000  # 7 jours

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_your_key}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_your_key}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_secret}

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.tonti: INFO
    org.hibernate.SQL: WARN

# App config - Production
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000       # 1 heure
    refresh-expiration: 604800000  # 7 jours

  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://tonti.app}
